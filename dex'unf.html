<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dex Page</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
        #emoji-container { font-size: 40px; margin-top: 20px; word-wrap: break-word; }
    </style>
</head>
<body>

    <h1>Welcome to the Dex Page</h1>
    <button id="enterBtn">Enter to dex page</button>
    <div id="emoji-container"></div>

    <script>
        const btn = document.getElementById('enterBtn');
        const container = document.getElementById('emoji-container');
        
        btn.addEventListener('click', () => {
            const emoji = document.createElement('span');
            emoji.textContent = "🤣";
            container.appendChild(emoji);
        });
    </script>
</body>
</html>
